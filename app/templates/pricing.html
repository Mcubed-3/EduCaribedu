
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing - EduCarib AI</title>

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6817907304188010"
     crossorigin="anonymous"></script>

  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body class="pricing-body">

  <div class="pricing-container">

    <h1>Simple pricing</h1>

    <div class="pricing-grid">

      <!-- FREE -->
      <div class="pricing-card">
        <h2>Free</h2>
        <h3>US$0 / month</h3>

        <ul>
          <li>10 lessons/month</li>
          <li>5 saved lessons</li>
          <li>PDF export</li>
          <li>Ads included</li>
        </ul>

        <button disabled>Current plan</button>
      </div>

      <!-- PRO -->
      <div class="pricing-card featured">
        <h2>Pro Teacher</h2>
        <h3>US$10 / month</h3>

        <ul>
          <li>Unlimited lessons</li>
          <li>Unlimited saved lessons</li>
          <li>DOCX export</li>
          <li>No ads</li>
        </ul>

        <button id="stripeUpgradeBtn">
          Unlock Pro – US$10/month
        </button>
      </div>

    </div>

    <!-- Optional ad at bottom -->
    <div style="margin-top:30px;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6817907304188010"
           data-ad-slot="3289424229"
           data-ad-format="auto"></ins>

      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

  </div>

  <script src="/static/pricing.js"></script>

</body>
</html>
